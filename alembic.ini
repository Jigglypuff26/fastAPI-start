# Универсальная конфигурация для одной базы данных.

[alembic]
# путь к скриптам миграций.
# обычно указывается в POSIX-формате (со слэшами), относительно токена
# %(here)s, который указывает на расположение этого ini-файла
script_location = %(here)s/migrations

# шаблон для имён файлов миграций; значение по умолчанию — %%(rev)s_%%(slug)s
# раскомментируйте строку ниже, если нужно добавлять дату и время в начало имени файла
# см. https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# про все доступные токены
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# либо раскладывать по подпапкам по дате (требует recursive_version_locations = true)
# file_template = %%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

# путь, который будет добавлен в sys.path, если указан.
# по умолчанию — текущая рабочая директория. для нескольких путей разделитель
# задаётся параметром "path_separator" ниже.
prepend_sys_path = .

# часовой пояс для отображения даты внутри файла миграции и в имени файла.
# если указан, требует библиотеку tzdata (добавляется через `alembic[tz]`
# в зависимостях pip).
# строковое значение передаётся в ZoneInfo()
# оставить пустым для локального времени
# timezone =

# максимальная длина поля "slug" в имени файла
# truncate_slug_length = 40

# 'true' — запускать env.py при команде 'revision', независимо от autogenerate
# revision_environment = false

# 'true' — разрешить обнаружение .pyc/.pyo файлов как ревизий в папке
# versions/ при отсутствии исходного .py файла
# sourceless = false

# расположение файлов версий; по умолчанию — <script_location>/versions.
# при нескольких директориях версий начальные ревизии нужно указывать через
# --version-path. разделитель путей задаётся параметром "path_separator" ниже.
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# path_separator; определяет символ-разделитель для списков путей
# (version_locations, prepend_sys_path) в конфиг-файлах вроде alembic.ini.
# значение по умолчанию в новых alembic.ini — "os" (использует os.pathsep).
#
# для поддержки старых alembic.ini это значение по умолчанию НЕ применяется,
# если path_separator отсутствует в файле. в этом случае логика такая:
#
# 1. version_locations парсится через устаревший ключ "version_path_separator",
#    а при его отсутствии — через старое поведение (разделение по пробелам и/или запятым).
# 2. prepend_sys_path парсится через старое поведение (разделение по пробелам,
#    запятым или двоеточиям).
#
# допустимые значения path_separator:
#
# path_separator = :
# path_separator = ;
# path_separator = space
# path_separator = newline
#
# os.pathsep — конфигурация по умолчанию для новых проектов.
path_separator = os


# 'true' — искать исходные файлы рекурсивно в каждой директории
# "version_locations" (появилось в Alembic 1.10)
# recursive_version_locations = false

# кодировка вывода при записи файлов ревизий из script.py.mako
# output_encoding = utf-8

# URL базы данных. Переопределяется во время выполнения в migrations/env.py
# из app.core.config.settings (собирается из .env) — значение здесь не используется.
sqlalchemy.url =


[post_write_hooks]
# post_write_hooks определяет скрипты или Python-функции, которые запускаются
# для только что сгенерированных файлов ревизий. Подробности и примеры — в документации

# форматирование через "black" - используется console_scripts runner, точка входа "black"
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# линтинг с автоисправлением через "ruff" - используется module runner, модуль "ruff"
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# альтернативный вариант - exec runner, запускающий бинарник из PATH
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Конфигурация логирования. Также используется только пользовательским
# скриптом env.py.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
