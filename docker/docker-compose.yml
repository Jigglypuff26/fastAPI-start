name: fastapi

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: fastapi-project
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      # Хост-машина недоступна по "localhost" изнутри контейнера — только
      # через специальный DNS-алиас Docker Desktop.
      - DB_HOST=host.docker.internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthcheck')"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
