name: fastapi

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: fastapi-project
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
