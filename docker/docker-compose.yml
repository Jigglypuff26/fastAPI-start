name: fastapi

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: fastapi-project
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      # Хост-машина недоступна по "localhost" изнутри контейнера — только
      # через специальный DNS-алиас Docker Desktop.
      - DB_HOST=host.docker.internal
      # Redis поднимается как сервис в этом же compose-стеке, поэтому
      # доступен по имени сервиса "redis" во внутренней docker-сети.
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: fastapi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

volumes:
  redis-data:
