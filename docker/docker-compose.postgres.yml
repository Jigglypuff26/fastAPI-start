services:
  api:
    environment:
      # Postgres поднимается как сервис в этом же compose-стеке, поэтому
      # доступен по имени сервиса "db" во внутренней docker-сети — вместо
      # host.docker.internal, которым базовый docker-compose.yml обращается
      # к Postgres на хосте.
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: fastapi-postgres
    environment:
      # Значения продублированы вручную из DB_USERNAME/DB_PASSWORD/DB_NAME в .env.
      # Docker Compose не подставляет их сюда автоматически (${VAR}-интерполяция
      # ищет .env рядом с первым -f файлом, т.е. в docker/, а не в корне проекта) —
      # при изменении DB_USERNAME/DB_PASSWORD/DB_NAME в .env продублируйте
      # изменение и здесь, иначе api не сможет авторизоваться в контейнере.
      - POSTGRES_USER=postgres-user
      - POSTGRES_PASSWORD=postgres-password
      - POSTGRES_DB=postgres-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

volumes:
  postgres-data:
